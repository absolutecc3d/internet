<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owned By YXN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
  font-family: 'Poppins', sans-serif;
  color: white;
}

.container {
  text-align: center;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 60px rgba(0,0,0,0.7);
  animation: fadeIn 1s ease;
}

h1 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 10px;
}

p {
  opacity: 0.7;
  margin-bottom: 20px;
}

img.main {
  width: 120px;
  transition: 0.3s;
}

img.main:hover {
  transform: scale(1.15) rotate(-5deg);
}

.owner {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.5;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
}

.owner img {
  width: 15px;
}

/* 🔥 BUTTON STYLE */
.button {
  margin-top: 25px;
  display: inline-block;
  padding: 12px 20px;
  border-radius: 12px;
  background: linear-gradient(135deg, #5865F2, #404EED);
  color: white;
  text-decoration: none;
  font-weight: 600;
  transition: 0.25s;
  box-shadow: 0 0 15px rgba(88,101,242,0.4);
}

.button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 25px rgba(88,101,242,0.7);
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>This piece of the internet is mine</h1>
  <p>and you're not having it.</p>

  <img class="main" src="https://bluemoji.io/cdn-proxy/646218c67da47160c64a84d5/698d12ef6e6021084ae535f3_104.png">

  <div class="owner">
    Owned by 
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    dcyxn
  </div>

  <!-- 🔥 BUTTON -->
  <a class="button" href="/network.html">
    YXN Network
  </a>
</div>

</body>
</html>
